<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chirag Singh — AI-Augmented Software Engineer</title>
    <meta
      name="description"
      content="Portfolio of Chirag Singh — AI-Augmented Software Engineer building scalable full-stack apps, AI/ML systems, and production-ready products."
    />
    <meta name="theme-color" content="#6425fe" />

    <!-- Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Chirag Singh — AI-Augmented Software Engineer" />
    <meta
      property="og:description"
      content="Portfolio of Chirag Singh — AI-Augmented Software Engineer building scalable full-stack apps, AI/ML systems, and production-ready products."
    />
    <meta property="og:image" content="/Image/Profile-960.webp" />
    <meta property="og:image:width" content="960" />
    <meta property="og:image:height" content="960" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chirag Singh — AI-Augmented Software Engineer" />
    <meta
      name="twitter:description"
      content="Portfolio of Chirag Singh — AI-Augmented Software Engineer building scalable full-stack apps, AI/ML systems, and production-ready products."
    />
    <meta name="twitter:image" content="/Image/Profile-960.webp" />

    <!-- Preload the LCP portrait so browsers fetch it in parallel with JS -->
    <link
      rel="preload"
      as="image"
      href="/Image/Profile-640.avif"
      type="image/avif"
      imagesrcset="/Image/Profile-320.avif 320w, /Image/Profile-640.avif 640w, /Image/Profile-960.avif 960w"
      imagesizes="(min-width: 1024px) 22rem, (min-width: 640px) 20rem, 16rem"
      fetchpriority="high"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
