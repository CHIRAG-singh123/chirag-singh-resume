<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Chirag Singh monogram</title>
  <desc id="desc">Animated CS monogram logo with a rotating signal ring and pulse glow.</desc>
  <style>
    .ring-rotate {
      transform-origin: 32px 32px;
      animation: ring-spin 18s linear infinite;
    }
    .pulse-ring {
      transform-origin: 32px 32px;
      animation: ring-pulse 3.2s ease-out infinite;
    }
    .letter-mark {
      animation: letter-float 5.8s ease-in-out infinite;
      transform-origin: 32px 32px;
    }
    @keyframes ring-spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
    @keyframes ring-pulse {
      0% {
        transform: scale(1);
        opacity: .4;
      }
      70% {
        transform: scale(1.2);
        opacity: 0;
      }
      100% {
        transform: scale(1.2);
        opacity: 0;
      }
    }
    @keyframes letter-float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-1px);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .ring-rotate,
      .pulse-ring,
      .letter-mark {
        animation: none;
      }
      .pulse-ring {
        opacity: 0;
      }
    }
  </style>
  <defs>
    <linearGradient id="csGradient" x1="14" y1="13" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#8b5cf6;#67e8f9;#a78bfa" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#67e8f9">
        <animate attributeName="stop-color" values="#67e8f9;#a78bfa;#8b5cf6;#67e8f9" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="badgeFill" cx="0" cy="0" r="1" gradientTransform="translate(20 14) rotate(43.6) scale(38.43)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121b34"/>
      <stop offset=".72" stop-color="#0d1428"/>
      <stop offset="1" stop-color="#091120"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="31" fill="transparent"/>

  <circle
    class="ring-rotate"
    cx="32"
    cy="32"
    r="27.5"
    fill="none"
    stroke="url(#csGradient)"
    stroke-width="1.75"
    stroke-dasharray="5 4"
    stroke-linecap="round"
    opacity=".42"
  />

  <circle
    class="pulse-ring"
    cx="32"
    cy="32"
    r="22.5"
    fill="none"
    stroke="url(#csGradient)"
    stroke-width="1.4"
    opacity=".34"
  />

  <circle cx="32" cy="32" r="24.6" fill="#121826" opacity=".95"/>
  <circle cx="32" cy="32" r="22.5" fill="url(#badgeFill)" stroke="url(#csGradient)" stroke-width="1.8" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="21.2" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="1"/>

  <g class="letter-mark" fill="#fff" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing=".6">
    <text x="15" y="39.5">C</text>
    <text x="30.5" y="39.5">S</text>
  </g>
</svg>
